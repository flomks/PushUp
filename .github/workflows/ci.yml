name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ '**' ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rebase-check:
    name: Rebase on Base Branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for rebase)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase on base branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git rebase origin/${{ github.base_ref }}
          git push --force-with-lease origin HEAD:${{ github.head_ref }}

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ rebase-check ]
    if: always() && (needs.rebase-check.result == 'success' || needs.rebase-check.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared module
        run: ./gradlew :shared:build --no-daemon --stacktrace

      - name: Build full project
        run: ./gradlew build --no-daemon --stacktrace

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ rebase-check ]
    if: always() && (needs.rebase-check.result == 'success' || needs.rebase-check.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run all tests
        run: ./gradlew allTests --no-daemon --stacktrace

      - name: Run JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ rebase-check ]
    if: always() && (needs.rebase-check.result == 'success' || needs.rebase-check.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint checks
        run: ./gradlew lint --no-daemon --stacktrace || true

      - name: Check Kotlin compilation
        run: ./gradlew compileKotlin --no-daemon --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          retention-days: 7
