name: Build & Deploy to Root Server

# Triggered bei jedem Push auf main wenn Backend-Dateien geaendert wurden.
# Der Workflow:
#   1. Baut das Docker-Image
#   2. Pusht es zu GitHub Container Registry (ghcr.io)
#   3. SSH-t in den Root-Server und zieht das neue Image
#   4. Rollback auf das vorherige Image wenn der Health-Check fehlschlaegt
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-root-server
  # Laufende Deployments NICHT abbrechen -- ein abgebrochener Deploy
  # hinterlaesst den Server in einem undefinierten Zustand.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # fuer ghcr.io push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/flomks/pushup-backend

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      deploy-image: ${{ steps.image.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Select deploy image tag
        id: image
        run: echo "deploy_image=${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache zwischen Builds -- beschleunigt Folge-Builds erheblich
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Root Server via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push

    env:
      DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.deploy-image }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:     ${{ secrets.SERVER_HOST }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            set -euo pipefail

            cd /opt/pushup
            IMAGE_NAME="ghcr.io/flomks/pushup-backend"
            DEPLOY_IMAGE="${DEPLOY_IMAGE}"

            print_runtime_diagnostics() {
              echo "----- docker compose ps -----"
              docker compose ps || true
              echo "----- container state -----"
              docker inspect pushup-backend --format '{{json .State}}' 2>/dev/null || true
              echo "----- recent backend logs -----"
              docker compose logs pushup-backend --tail=200 || true
            }

            # ------------------------------------------------------------------
            # 1. Vorheriges :latest als :rollback sichern (BEVOR ein neuer Pull
            #    oder spaeteres prune laeuft)
            # ------------------------------------------------------------------
            if docker image inspect "${IMAGE_NAME}:latest" \
                 > /dev/null 2>&1; then
              docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:rollback"
              echo "Rollback-Tag gesetzt."
            else
              echo "Kein vorheriges Image -- kein Rollback-Tag."
            fi

            # ------------------------------------------------------------------
            # 2. Exakt das frisch gebaute Image ziehen und als :latest aktivieren
            # ------------------------------------------------------------------
            echo "Ziehe Deploy-Image: ${DEPLOY_IMAGE}"
            docker pull "${DEPLOY_IMAGE}"
            docker tag "${DEPLOY_IMAGE}" "${IMAGE_NAME}:latest"

            echo "Starte neuen Container ..."
            docker compose up -d --no-deps --pull never pushup-backend

            # ------------------------------------------------------------------
            # 3. Health-Check (20 Versuche x 5 s = 100 s)
            #    start_period in docker-compose.yml ist 15 s, daher erst nach
            #    einer kurzen Pause anfangen zu pruefen.
            # ------------------------------------------------------------------
            echo "Warte auf Container-Start..."
            sleep 15

            HEALTHY=false
            for i in $(seq 1 20); do
              CONTAINER_STATUS=$(docker inspect pushup-backend --format '{{.State.Status}}' 2>/dev/null || echo "missing")
              HEALTH_STATUS=$(docker inspect pushup-backend --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || echo "missing")
              HTTP=$(curl --silent --output /dev/null \
                         --write-out "%{http_code}" \
                         --max-time 5 \
                         http://localhost:8080/health || echo "000")
              echo "Health-Check Versuch ${i}/20 -- container=${CONTAINER_STATUS} docker-health=${HEALTH_STATUS} http=${HTTP}"
              if [ "${HTTP}" = "200" ]; then
                HEALTHY=true
                break
              fi
              sleep 5
            done

            if [ "${HEALTHY}" = "true" ]; then
              echo "Deploy erfolgreich -- pushup.weareo.fun ist aktuell"
              print_runtime_diagnostics
              # Erst NACH erfolgreichem Deploy alte Images aufraeumen
              # (nicht :rollback -- das wird beim naechsten Deploy ueberschrieben)
              docker image prune -f --filter "until=24h"
              exit 0
            fi

            # ------------------------------------------------------------------
            # 4. Health-Check fehlgeschlagen -- Logs ausgeben und Rollback
            # ------------------------------------------------------------------
            echo "Health-Check fehlgeschlagen -- starte Rollback..."
            print_runtime_diagnostics

            if docker image inspect "${IMAGE_NAME}:rollback" \
                 > /dev/null 2>&1; then
              docker tag "${IMAGE_NAME}:rollback" "${IMAGE_NAME}:latest"
              docker compose up -d --no-deps --pull never pushup-backend
              sleep 10
              echo "----- rollback diagnostics -----"
              print_runtime_diagnostics
              echo "Rollback abgeschlossen -- vorherige Version laeuft wieder."
            else
              echo "Kein Rollback-Image vorhanden -- manueller Eingriff noetig."
              print_runtime_diagnostics
              docker compose down
            fi

            exit 1
