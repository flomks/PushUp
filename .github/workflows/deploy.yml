name: Build & Deploy to Root Server

# Triggered bei jedem Push auf main wenn Backend-Dateien geaendert wurden.
# Der Workflow:
#   1. Baut das Docker-Image
#   2. Pusht es zu GitHub Container Registry (ghcr.io)
#   3. SSH-t in den Root-Server und zieht das neue Image
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-root-server
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # fuer ghcr.io push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/flomks/pushup-backend

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache zwischen Builds -- beschleunigt Folge-Builds erheblich
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Root Server via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push

    steps:
      - name: Checkout (fuer docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            # Ins Deployment-Verzeichnis wechseln
            cd /opt/pushup

            # Neues Image ziehen
            docker pull ghcr.io/flomks/pushup-backend:latest

            # Container neu starten mit neuem Image
            docker compose up -d --pull always pushup-backend

            # Kurz warten bis der Container hochgefahren ist
            sleep 5

            # Health-Check
            curl --fail --silent http://localhost:8080/health || {
              echo "Health check failed -- rolling back"
              docker compose down
              exit 1
            }

            echo "Deploy erfolgreich -- pushup.weareo.fun ist aktuell"

            # Alte ungenutzte Images aufraeumen
            docker image prune -f
