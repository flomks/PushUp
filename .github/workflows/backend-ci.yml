# Backend CI/CD Pipeline
#
# Triggered on every push to main when backend-related files change.
#
# Pipeline stages:
#   1. lint    -- Kotlin compilation check (catches type/syntax errors)
#   2. test    -- Unit tests via Gradle
#   3. build   -- Build & push Docker image to GHCR (ghcr.io)
#   4. deploy  -- SSH into root server, pull new image, restart container,
#                 run health check -- rollback to previous image on failure
#
# Required GitHub Secrets:
#   SERVER_HOST     -- IP address of the root server
#   SERVER_USER     -- SSH username (e.g. root or ubuntu)
#   SERVER_SSH_KEY  -- Private SSH key (full content incl. BEGIN/END lines)
#   SERVER_PORT     -- SSH port (optional, defaults to 22)

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-cd
  # Never cancel an in-progress deployment -- let it finish to avoid partial state
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # required for ghcr.io push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/flomks/pushup-backend

# ---------------------------------------------------------------------------
# Job 1: Lint
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile Kotlin sources -- catches type errors and syntax issues
      # without running tests (tests run in the dedicated test job below).
      - name: Compile backend Kotlin sources
        run: ./gradlew :backend:compileKotlin :backend:compileTestKotlin --no-daemon --stacktrace

      - name: Upload compilation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: backend/build/reports/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job 2: Test
# ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        run: ./gradlew :backend:test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/build/reports/tests/
            backend/build/test-results/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job 3: Build Docker Image & Push to GHCR
# ---------------------------------------------------------------------------
  build:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]

    outputs:
      # Short SHA tag used to pin the exact image during deploy & rollback
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in the registry -- speeds up subsequent builds
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false

# ---------------------------------------------------------------------------
# Job 4: Deploy to Root Server via SSH
# ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Root Server via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Deploy, health-check, rollback on failure
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || '22' }}
          # NEW_TAG is the exact sha- tag built in the previous job.
          # Passing it as an env var keeps the script free of expression syntax.
          envs: NEW_TAG
          script_stop: true   # abort on first error (set -e equivalent)
          script: |
            set -euo pipefail

            DEPLOY_DIR=/opt/pushup
            IMAGE=ghcr.io/flomks/pushup-backend
            NEW_IMAGE="${IMAGE}:${NEW_TAG}"

            echo "==> Deploying ${NEW_IMAGE}"

            cd "${DEPLOY_DIR}"

            # ------------------------------------------------------------------
            # 1. Record the currently running image tag for rollback
            # ------------------------------------------------------------------
            PREV_IMAGE=$(docker inspect pushup-backend \
              --format '{{.Config.Image}}' 2>/dev/null || echo "")
            echo "    Previous image: ${PREV_IMAGE:-<none>}"

            # ------------------------------------------------------------------
            # 2. Pull the new image
            # ------------------------------------------------------------------
            docker pull "${NEW_IMAGE}"

            # ------------------------------------------------------------------
            # 3. Update docker-compose.yml to use the pinned sha- tag
            #    (avoids relying on :latest during rollback)
            # ------------------------------------------------------------------
            sed -i "s|image: ${IMAGE}:.*|image: ${NEW_IMAGE}|g" docker-compose.yml

            # ------------------------------------------------------------------
            # 4. Restart the container with the new image
            # ------------------------------------------------------------------
            docker compose up -d --pull never pushup-backend

            # ------------------------------------------------------------------
            # 5. Health check (12 attempts x 5 s = 60 s window)
            # ------------------------------------------------------------------
            echo "==> Running health check..."
            HEALTHY=false
            for i in $(seq 1 12); do
              HTTP=$(curl --silent --output /dev/null \
                         --write-out "%{http_code}" \
                         --max-time 5 \
                         http://localhost:8080/health || echo "000")
              echo "    Attempt ${i}/12 -- HTTP ${HTTP}"
              if [ "${HTTP}" = "200" ]; then
                HEALTHY=true
                break
              fi
              sleep 5
            done

            if [ "${HEALTHY}" = "true" ]; then
              echo "==> Deploy successful -- pushup.weareo.fun is up to date"
              # Clean up dangling images to free disk space
              docker image prune -f
              exit 0
            fi

            # ------------------------------------------------------------------
            # 6. Health check failed -- roll back to previous image
            # ------------------------------------------------------------------
            echo "==> Health check failed -- rolling back to ${PREV_IMAGE:-latest}"

            if [ -n "${PREV_IMAGE}" ]; then
              # Restore the previous image reference in docker-compose.yml
              sed -i "s|image: ${NEW_IMAGE}|image: ${PREV_IMAGE}|g" docker-compose.yml
              docker compose up -d --pull never pushup-backend
            else
              # No previous image recorded -- fall back to :latest
              sed -i "s|image: ${NEW_IMAGE}|image: ${IMAGE}:latest|g" docker-compose.yml
              docker compose up -d --pull always pushup-backend
            fi

            # Verify rollback is healthy
            sleep 10
            RB_HTTP=$(curl --silent --output /dev/null \
                          --write-out "%{http_code}" \
                          --max-time 5 \
                          http://localhost:8080/health || echo "000")
            if [ "${RB_HTTP}" = "200" ]; then
              echo "==> Rollback successful -- previous version is running"
            else
              echo "==> Rollback health check also failed (HTTP ${RB_HTTP}) -- manual intervention required"
            fi

            # Exit with error so GitHub Actions marks this run as failed
            exit 1
        env:
          NEW_TAG: ${{ needs.build.outputs.image-tag }}
