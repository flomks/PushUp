# Nginx Konfiguration fuer pushup.weareo.fun
#
# Auf dem Server kopieren nach:
#   /etc/nginx/sites-available/pushup.weareo.fun
#
# Dann aktivieren:
#   sudo ln -s /etc/nginx/sites-available/pushup.weareo.fun /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL-Zertifikat mit Certbot holen:
#   sudo certbot --nginx -d pushup.weareo.fun

# HTTP --> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name pushup.weareo.fun;

    # Certbot platziert hier automatisch den ACME-Challenge Block
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pushup.weareo.fun;

    # SSL -- wird von Certbot automatisch eingetragen
    ssl_certificate     /etc/letsencrypt/live/pushup.weareo.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pushup.weareo.fun/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "no-referrer"     always;

    # Proxy zum Ktor-Backend Container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # Health-Check direkt erreichbar (kein Auth noetig)
    location /health {
        proxy_pass         http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
