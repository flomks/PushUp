openapi: 3.1.0
info:
  title: Sinura API
  description: Backend API for the Sinura fitness app.
  version: 0.1.0

servers:
  - url: https://api.sinura.fun
    description: Production

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token (RS256 or HS256).

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
          nullable: true

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    UserResponse:
      type: object
      required: [id, email, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserStatsResponse:
      type: object
      required: [totalPushUps, totalSessions, totalEarnedSeconds]
      properties:
        totalPushUps:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true
        averagePushUpsPerSession:
          type: number
          nullable: true
        bestSessionPushUps:
          type: integer
          nullable: true
        firstWorkoutDate:
          type: string
          nullable: true

    TimeCreditResponse:
      type: object
      required: [totalEarnedSeconds, totalSpentSeconds, availableSeconds]
      properties:
        totalEarnedSeconds:
          type: integer
          format: int64
        totalSpentSeconds:
          type: integer
          format: int64
        availableSeconds:
          type: integer
          format: int64

    StreakResponse:
      type: object
      required: [currentStreak, longestStreak]
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        lastWorkoutDate:
          type: string
          nullable: true

    UserDataResponse:
      type: object
      required: [user, stats, timeCredit, streak]
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        stats:
          $ref: '#/components/schemas/UserStatsResponse'
        timeCredit:
          $ref: '#/components/schemas/TimeCreditResponse'
        streak:
          $ref: '#/components/schemas/StreakResponse'

    UsernameCheckResponse:
      type: object
      required: [username, available]
      properties:
        username:
          type: string
        available:
          type: boolean

    SetUsernameRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20

    SetUsernameResponse:
      type: object
      required: [username]
      properties:
        username:
          type: string

    UserSearchResult:
      type: object
      required: [id, friendshipStatus]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        friendshipStatus:
          type: string
          enum: [none, pending, friend]

    UserSearchResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserSearchResult'
        total:
          type: integer

    DailyStatsDTO:
      type: object
      required: [date, totalPushUps, totalSessions, totalEarnedSeconds]
      properties:
        date:
          type: string
          format: date
        totalPushUps:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true

    WeeklyStatsDTO:
      type: object
      required: [weekStart, weekEnd, totalPushUps, totalSessions, totalEarnedSeconds, dailyBreakdown]
      properties:
        weekStart:
          type: string
          format: date
        weekEnd:
          type: string
          format: date
        totalPushUps:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true
        dailyBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/DailyStatsDTO'

    MonthlyStatsDTO:
      type: object
      required: [month, year, totalPushUps, totalSessions, totalEarnedSeconds, weeklyBreakdown]
      properties:
        month:
          type: integer
        year:
          type: integer
        totalPushUps:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true
        weeklyBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyStatsDTO'

    TotalStatsDTO:
      type: object
      required: [totalPushUps, totalSessions, totalEarnedSeconds]
      properties:
        totalPushUps:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true
        averagePushUpsPerSession:
          type: number
          nullable: true
        bestSessionPushUps:
          type: integer
          nullable: true
        firstWorkoutDate:
          type: string
          nullable: true

    StreakDTO:
      type: object
      required: [currentStreak, longestStreak]
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        lastWorkoutDate:
          type: string
          nullable: true

    ActivityDayDTO:
      type: object
      required: [date, totalSessions, totalEarnedSeconds]
      properties:
        date:
          type: string
          format: date
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64

    ActivityMonthlyDTO:
      type: object
      required: [month, year, days, activeDays, totalSessions, totalEarnedSeconds]
      properties:
        month:
          type: integer
        year:
          type: integer
        days:
          type: array
          items:
            $ref: '#/components/schemas/ActivityDayDTO'
        activeDays:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64

    ActivityStreakDTO:
      type: object
      required: [currentStreak, longestStreak]
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        lastActivityDate:
          type: string
          nullable: true

    RegisterDeviceTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        platform:
          type: string
          default: apns

    RegisterDeviceTokenResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    FriendProfile:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    FriendsListResponse:
      type: object
      required: [friends, total]
      properties:
        friends:
          type: array
          items:
            $ref: '#/components/schemas/FriendProfile'
        total:
          type: integer

    IncomingFriendRequest:
      type: object
      required: [friendshipId, requesterId, createdAt]
      properties:
        friendshipId:
          type: string
          format: uuid
        requesterId:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    IncomingFriendRequestsResponse:
      type: object
      required: [requests, total]
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/IncomingFriendRequest'
        total:
          type: integer

    SendFriendRequestBody:
      type: object
      required: [receiverId]
      properties:
        receiverId:
          type: string
          format: uuid

    RespondFriendRequestBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, declined]

    FriendshipResponse:
      type: object
      required: [id, requesterId, receiverId, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        requesterId:
          type: string
          format: uuid
        receiverId:
          type: string
          format: uuid
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    FriendCodeResponse:
      type: object
      required: [code, privacy, deepLink, createdAt, updatedAt]
      properties:
        code:
          type: string
          example: AB3X7K2M
        privacy:
          type: string
          enum: [auto_accept, require_approval, inactive]
        deepLink:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateFriendCodePrivacyRequest:
      type: object
      required: [privacy]
      properties:
        privacy:
          type: string
          enum: [auto_accept, require_approval, inactive]

    UseFriendCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string

    UseFriendCodeResponse:
      type: object
      required: [result, ownerProfile, friendship]
      properties:
        result:
          type: string
          enum: [added, pending]
        ownerProfile:
          $ref: '#/components/schemas/FriendProfile'
        friendship:
          $ref: '#/components/schemas/FriendshipResponse'

    DateRangeDTO:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date

    FriendActivityStatsDTO:
      type: object
      required: [friendId, period, dateRange, activityPoints, pushupCount, totalSessions, totalEarnedSeconds, currentStreak, friendLevel]
      properties:
        friendId:
          type: string
          format: uuid
        period:
          type: string
        dateRange:
          $ref: '#/components/schemas/DateRangeDTO'
        activityPoints:
          type: integer
        pushupCount:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        averageQuality:
          type: number
          nullable: true
        currentStreak:
          type: integer
        friendLevel:
          type: integer

    FriendActivityDayDTO:
      type: object
      required: [date, activityPoints, totalSessions, totalEarnedSeconds]
      properties:
        date:
          type: string
          format: date
        activityPoints:
          type: integer
        totalSessions:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64

    FriendMonthlyActivityDTO:
      type: object
      required: [friendId, month, year, days, activeDays, totalSessions, totalActivityPoints, totalEarnedSeconds]
      properties:
        friendId:
          type: string
          format: uuid
        month:
          type: integer
        year:
          type: integer
        days:
          type: array
          items:
            $ref: '#/components/schemas/FriendActivityDayDTO'
        activeDays:
          type: integer
        totalSessions:
          type: integer
        totalActivityPoints:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64

    FriendExerciseLevelDTO:
      type: object
      required: [exerciseTypeId, level, totalXp, xpIntoLevel, xpRequiredForNextLevel, levelProgress]
      properties:
        exerciseTypeId:
          type: string
        level:
          type: integer
        totalXp:
          type: integer
          format: int64
        xpIntoLevel:
          type: integer
          format: int64
        xpRequiredForNextLevel:
          type: integer
          format: int64
        levelProgress:
          type: number

    FriendLevelDetailsDTO:
      type: object
      required: [friendId, level, totalXp, xpIntoLevel, xpRequiredForNextLevel, levelProgress, exerciseLevels]
      properties:
        friendId:
          type: string
          format: uuid
        level:
          type: integer
        totalXp:
          type: integer
          format: int64
        xpIntoLevel:
          type: integer
          format: int64
        xpRequiredForNextLevel:
          type: integer
          format: int64
        levelProgress:
          type: number
        exerciseLevels:
          type: array
          items:
            $ref: '#/components/schemas/FriendExerciseLevelDTO'

    JoggingTotalStatsDTO:
      type: object
      required: [totalDistanceMeters, totalDurationSeconds, totalSessions, totalCaloriesBurned, totalEarnedSeconds]
      properties:
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: integer
          format: int64
        totalSessions:
          type: integer
        totalCaloriesBurned:
          type: integer
        totalEarnedSeconds:
          type: integer
          format: int64
        avgPaceSecondsPerKm:
          type: integer
          nullable: true
        bestDistanceMeters:
          type: number
          nullable: true

    JoggingSessionHistoryDTO:
      type: object
      required: [id, startedAt, distanceMeters, durationSeconds, caloriesBurned, earnedTimeCredits]
      properties:
        id:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        distanceMeters:
          type: number
        durationSeconds:
          type: integer
        avgPaceSecondsPerKm:
          type: integer
          nullable: true
        caloriesBurned:
          type: integer
        earnedTimeCredits:
          type: integer

    RoutePointResponseDTO:
      type: object
      required: [id, timestamp, latitude, longitude, distanceFromStart]
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        latitude:
          type: number
        longitude:
          type: number
        altitude:
          type: number
          nullable: true
        speed:
          type: number
          nullable: true
        horizontalAccuracy:
          type: number
          nullable: true
        distanceFromStart:
          type: number

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/me:
    get:
      tags: [User]
      summary: Get authenticated user profile
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/user/data:
    get:
      tags: [User]
      summary: Get user dashboard data
      description: Aggregates profile, stats, time credits, and streak in a single request.
      responses:
        '200':
          description: Dashboard data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDataResponse'
        '401':
          description: Unauthorized.

  /v1/users/username/check:
    get:
      tags: [Username]
      summary: Check username availability
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameCheckResponse'
        '400':
          description: Invalid username.

  /v1/users/username:
    patch:
      tags: [Username]
      summary: Set or update username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUsernameRequest'
      responses:
        '200':
          description: Username set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetUsernameResponse'
        '400':
          description: Invalid username format.
        '409':
          description: Username already taken.

  /v1/users/search:
    get:
      tags: [User]
      summary: Search users
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (min 2 chars, substring match on username/displayName).
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Search results (max 20).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResponse'
        '400':
          description: Missing or too-short query.

  /v1/stats/daily:
    get:
      tags: [Stats]
      summary: Daily push-up stats
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStatsDTO'

  /v1/stats/weekly:
    get:
      tags: [Stats]
      summary: Weekly push-up stats
      parameters:
        - name: week_start
          in: query
          required: true
          description: Monday of target week (YYYY-MM-DD).
          schema:
            type: string
            format: date
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyStatsDTO'

  /v1/stats/monthly:
    get:
      tags: [Stats]
      summary: Monthly push-up stats
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyStatsDTO'

  /v1/stats/total:
    get:
      tags: [Stats]
      summary: All-time push-up stats
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalStatsDTO'

  /v1/stats/streak:
    get:
      tags: [Stats]
      summary: Push-up workout streak
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreakDTO'

  /v1/stats/activity/heatmap:
    get:
      tags: [Activity Stats]
      summary: Monthly activity heatmap
      description: Returns per-day activity data across all workout types for a given month.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityMonthlyDTO'

  /v1/stats/activity/streak:
    get:
      tags: [Activity Stats]
      summary: Unified activity streak
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStreakDTO'

  /v1/device-token:
    post:
      tags: [Device Token]
      summary: Register device push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceTokenRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceTokenResponse'

  /v1/friends:
    get:
      tags: [Friends]
      summary: List friends
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [accepted, incoming, outgoing]
            default: accepted
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsListResponse'

  /v1/friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List incoming friend requests
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomingFriendRequestsResponse'

  /v1/friends/request:
    post:
      tags: [Friends]
      summary: Send friend request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequestBody'
      responses:
        '201':
          description: Friend request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendshipResponse'
        '409':
          description: Already friends or pending request exists.
        '422':
          description: Cannot send request to self.

  /v1/friends/request/{id}:
    patch:
      tags: [Friends]
      summary: Accept or decline friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondFriendRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendshipResponse'
        '409':
          description: Request already accepted/declined.

  /v1/friends/{id}:
    delete:
      tags: [Friends]
      summary: Remove friend
      parameters:
        - name: id
          in: path
          required: true
          description: Friend's user ID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Friendship removed.
        '404':
          description: No accepted friendship exists.

  /v1/friend-code:
    get:
      tags: [Friend Code]
      summary: Get own friend code
      description: Auto-creates a code if the user doesn't have one yet.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendCodeResponse'

  /v1/friend-code/privacy:
    patch:
      tags: [Friend Code]
      summary: Update friend code privacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFriendCodePrivacyRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendCodeResponse'

  /v1/friend-code/reset:
    post:
      tags: [Friend Code]
      summary: Reset friend code
      description: Generates a new code, invalidating the previous one.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendCodeResponse'

  /v1/friend-code/use:
    post:
      tags: [Friend Code]
      summary: Use a friend code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UseFriendCodeRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UseFriendCodeResponse'
        '404':
          description: Code does not exist.
        '409':
          description: Already friends or request pending.
        '410':
          description: Code is inactive.
        '422':
          description: Cannot use own code.

  /v1/friends/{id}/stats:
    get:
      tags: [Friend Stats]
      summary: Get friend activity stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [day, week, month]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendActivityStatsDTO'
        '403':
          description: Not friends with target user.

  /v1/friends/{id}/heatmap:
    get:
      tags: [Friend Stats]
      summary: Get friend monthly heatmap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
      responses:
        '200':
          content:
